# VOLTRON Stack Health Monitor
# Runs daily (FATHER-TIME cron) + on push
# FREE TIER: unlimited on public repos, 2000 min/month on private
# Checks all NOMADZ repos, posts health report to Issues

name: VOLTRON Stack Health

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [ main, Cosmic-key ]
  workflow_dispatch:

jobs:
  stack-health:
    name: Stack Health Report
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout VOLTRON
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run Stack Health Check
        id: health
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, requests, json
          from datetime import datetime

          owner = 'ovbslaught'
          token = os.environ.get('GH_TOKEN', '')
          headers = {
            'Authorization': f'Bearer {token}',
            'Accept': 'application/vnd.github.v3+json'
          }

          repos = [
            'VOLTRON', 'MOTHER-BRAIN', 'NOMADZ-0', 'monolith-v.1',
            'Cosmic-key', 'ocean', 'NOMADZ-', 'nomadz-swarm-rl-agents',
            'omega-space-indexer', 'watchdog', 'NOMADZ_ARCHIVE'
          ]

          brain_map = {
            'VOLTRON': 'THE CHASSIS',
            'MOTHER-BRAIN': 'CENTRAL HUB',
            'NOMADZ-0': 'GAME SUBSTRATE + OCEAN',
            'monolith-v.1': 'FATHER-BRAIN (pending rename)',
            'Cosmic-key': 'COSMIC-BRAIN (repurposed)',
            'NOMADZ-': 'GEO-BRAIN',
            'ocean': 'OCEAN -> NOMADZ-0',
            'nomadz-swarm-rl-agents': 'SWARM RL',
            'omega-space-indexer': 'OMEGA-BRAIN',
            'watchdog': 'WATCHDOG',
            'NOMADZ_ARCHIVE': 'COLD ARCHIVE'
          }

          report = []
          report.append('# VOLTRON Stack Health Report')
          report.append(f'**Generated:** {datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")}')
          report.append('')
          report.append('| Repo | Role | Issues | PRs | Last Push | Status |')
          report.append('|------|------|--------|-----|-----------|--------|')

          all_ok = True
          for repo in repos:
            role = brain_map.get(repo, repo)
            try:
              r = requests.get(
                f'https://api.github.com/repos/{owner}/{repo}',
                headers=headers, timeout=10
              )
              if r.status_code == 200:
                data = r.json()
                pushed = data.get('pushed_at', 'unknown')[:10]
                pr_r = requests.get(
                  f'https://api.github.com/repos/{owner}/{repo}/pulls?state=open&per_page=100',
                  headers=headers, timeout=10
                )
                prs = len(pr_r.json()) if pr_r.status_code == 200 else '?'
                total = data.get('open_issues_count', 0)
                issues = total - (prs if isinstance(prs, int) else 0)
                status = 'OK' if issues == 0 and (prs == 0 or isinstance(prs, int)) else 'ATTENTION'
                if status == 'ATTENTION':
                  all_ok = False
                report.append(f'| {repo} | {role} | {issues} | {prs} | {pushed} | {status} |')
              elif r.status_code == 404:
                report.append(f'| {repo} | {role} | 404 NOT FOUND | - | - | MISSING |')
                all_ok = False
              else:
                report.append(f'| {repo} | {role} | ERROR {r.status_code} | - | - | ERROR |')
                all_ok = False
            except Exception as e:
              report.append(f'| {repo} | {role} | TIMEOUT | - | - | ERROR |')
              all_ok = False

          report.append('')
          report.append(f'**Overall Status:** {"ALL SYSTEMS GO" if all_ok else "ACTION NEEDED"}')
          report.append('')
          report.append('## Pending Actions')
          report.append('- [ ] Rename monolith-v.1 -> FATHER-BRAIN (do in GitHub Settings)')
          report.append('- [ ] Rename Cosmic-key -> COSMIC-BRAIN (do in GitHub Settings)')
          report.append('- [ ] Move OCEAN content into NOMADZ-0 scenes/scripts/assets')
          report.append('')
          report.append('_Auto-generated by VOLTRON Stack Health | phi=0.618_')

          full_report = '\n'.join(report)
          print(full_report)

          with open('stack-health-report.md', 'w') as f:
            f.write(full_report)
          PYEOF

      - name: Upload Health Report
        uses: actions/upload-artifact@v4
        with:
          name: stack-health-${{ github.run_number }}
          path: stack-health-report.md
          retention-days: 30

      - name: Create or Update Health Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('stack-health-report.md', 'utf8');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['stack-health']
            });

            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: report
              });
              core.info('Updated existing stack health issue');
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'VOLTRON Stack Health Report',
                body: report,
                labels: ['stack-health', 'automated']
              });
              core.info('Created new stack health issue');
            }
